name: publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: tests/IntegrationConsumer/global.json

      - name: Require NuGet API key
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY is required to publish."
            exit 1
          fi

      - name: Pack SDK
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          dotnet pack ./src/Atya.Build.Sdk.csproj -c Release -o ./artifacts -p:PackageVersion="$version"

      - name: Push package
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json
